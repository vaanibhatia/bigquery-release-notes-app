<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BigQuery Release Notes Explorer</title>
    <!-- Google Fonts for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar or Header -->
        <header class="app-header">
            <div class="header-brand">
                <div class="logo-icon">
                    <!-- Google Cloud BigQuery themed premium SVG icon -->
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M19 3H5C3.9 3 3 3.9 3 5V19C3 20.1 3.9 21 5 21H19C20.1 21 21 20.1 21 19V5C21 3.9 20.1 3 19 3ZM9 17H7V10H9V17ZM13 17H11V7H13V17ZM17 17H15V13H17V17Z" fill="currentColor"/>
                    </svg>
                </div>
                <div class="brand-text">
                    <h1>BigQuery</h1>
                    <span class="sub-title">Release Notes Explorer</span>
                </div>
            </div>

            <!-- Controls (Search + Refresh) -->
            <div class="header-controls">
                <div class="search-box">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" fill="currentColor"/>
                    </svg>
                    <input type="text" id="search-input" placeholder="Search updates..." aria-label="Search updates">
                </div>
                
                <button id="refresh-btn" class="btn btn-primary" title="Refresh release notes" aria-label="Refresh release notes">
                    <span class="btn-text">Refresh</span>
                    <svg class="spinner-icon" id="refresh-spinner" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z" fill="currentColor"/>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Main Dashboard View -->
        <main class="app-main">
            <!-- Filter Bar -->
            <section class="filter-section">
                <div class="filter-group" id="filter-tabs">
                    <button class="filter-tab active" data-type="all">All Updates</button>
                    <button class="filter-tab" data-type="feature">
                        <span class="dot dot-feature"></span> Features
                    </button>
                    <button class="filter-tab" data-type="announcement">
                        <span class="dot dot-announcement"></span> Announcements
                    </button>
                    <button class="filter-tab" data-type="issue">
                        <span class="dot dot-issue"></span> Issues
                    </button>
                    <button class="filter-tab" data-type="deprecation">
                        <span class="dot dot-deprecation"></span> Deprecations
                    </button>
                </div>
                <div class="results-meta" id="results-meta">
                    Loading updates...
                </div>
            </section>

            <!-- Release Notes Feed -->
            <section class="feed-section" id="notes-feed">
                <!-- Skeleton loader will be inserted here dynamically -->
                <div class="skeletons">
                    <div class="skeleton-card"></div>
                    <div class="skeleton-card"></div>
                    <div class="skeleton-card"></div>
                </div>
            </section>
        </main>
    </div>

    <!-- Tweet Composer Modal -->
    <div class="modal-overlay" id="tweet-modal">
        <div class="modal-card">
            <header class="modal-header">
                <h2>Share on X (Twitter)</h2>
                <button class="close-btn" id="close-modal-btn" aria-label="Close modal">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12 19 6.41Z" fill="currentColor"/>
                    </svg>
                </button>
            </header>
            
            <div class="modal-body">
                <p class="modal-hint">Review and edit your tweet draft below. We've formatted it to fit within the character limit.</p>
                <div class="tweet-composer">
                    <textarea id="tweet-textarea" rows="5" maxlength="280" placeholder="What's happening?"></textarea>
                    <div class="composer-footer">
                        <span class="char-counter" id="char-counter">280</span>
                    </div>
                </div>
            </div>

            <footer class="modal-footer">
                <button class="btn btn-secondary" id="cancel-tweet-btn">Cancel</button>
                <button class="btn btn-tweet" id="submit-tweet-btn">
                    <svg class="x-logo-svg" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                    </svg>
                    <span>Post to X</span>
                </button>
            </footer>
        </div>
    </div>

    <!-- Application Script -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
